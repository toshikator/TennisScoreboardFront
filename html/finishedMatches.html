<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Tennis Scoreboard — Finished Matches</title>
    <link href="../styles.css?v=4" rel="stylesheet">
</head>
<body class="finished-matches">
<div id="site-header"></div>

<main>
    <section class="section">
        <h1>Finished Matches</h1>

        <form id="matches-search-form">
            <label for="first-name-search">
                First name
                <input
                        autocomplete="off"
                        id="first-name-search"
                        name="firstName"
                        placeholder="Player first name"
                        type="text"
                >
            </label>

            <label for="last-name-search">
                Last name
                <input
                        autocomplete="off"
                        id="last-name-search"
                        name="lastName"
                        placeholder="Player last name"
                        type="text"
                >
            </label>

            <button type="submit">Find matches</button>
        </form>

        <p
                aria-live="polite"
                class="empty-state"
                id="matches-status"
        ></p>

        <div
                aria-live="polite"
                class="players-list matches-list"
                id="matches-list"
        ></div>

        <p
                class="empty-state"
                hidden
                id="matches-empty"
        >
            No matches were found. Try different search criteria.
        </p>
    </section>
</main>

<div id="site-footer"></div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/finished-matches.js"></script>
</body>
</html>
