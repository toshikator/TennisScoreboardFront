<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tennis Scoreboard — Players</title>
    <link href="../styles.css?v=4" rel="stylesheet">
</head>

<body class="players">

<div id="site-header"></div>

<main>
    <section class="section">
        <h1>Players</h1>

        <form id="player-form">
            <label for="first-name">First name</label>
            <input id="first-name" name="firstName" placeholder="Player firstname" required type="text">

            <label for="last-name">Last name</label>
            <input id="last-name" name="lastName" placeholder="Player lastname" required type="text">

            <button type="submit">Add Player</button>
        </form>

        <div class="players-list" id="players-list"></div>

        <p class="empty-state" hidden id="players-empty">
            No players yet. Click "Add Player" to create your first player.
        </p>
    </section>
</main>

<div id="site-footer"></div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/players.js"></script>

</body>
</html>
